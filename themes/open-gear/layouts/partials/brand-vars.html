{{- /* Injects brand colour CSS custom properties from params.toml.
       Overrides the defaults defined in main.css so changing params.toml
       is all that is needed to rebrand the entire site. */ -}}
<style>
  :root {
    --color-primary:     {{ .Site.Params.primaryColor }};
    --color-primary-rgb: {{ .Site.Params.primaryColorRgb }};
    --color-accent:      {{ .Site.Params.accentColor }};
  }
</style>
