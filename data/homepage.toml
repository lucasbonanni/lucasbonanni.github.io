# ── How I Work ───────────────────────────────────────────────────────────────
[howIWork]
  label      = "Process"
  heading    = "How I work"
  subheading = "A deliberate, repeatable approach — no matter the stack or scale."

[[howIWork.steps]]
  number      = "01"
  title       = "Diagnose the real constraint"
  description = "I start by identifying what is actually limiting you — latency, reliability, deploy risk, or toil — not the symptom."
  icon        = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'

[[howIWork.steps]]
  number      = "02"
  title       = "Design small, testable changes"
  description = "Architecture proposals and rollout plans shaped to be incremental — minimise blast radius, maximise learning speed."
  icon        = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>'

[[howIWork.steps]]
  number      = "03"
  title       = "Automate & document the path"
  description = "CI/CD pipelines, IaC modules, and runbooks that let your team move safely without relying on tribal knowledge."
  icon        = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>'

[[howIWork.steps]]
  number      = "04"
  title       = "Measure impact & iterate"
  description = "SLOs, error budgets, and cost signals to validate the change worked — and a feedback loop built in from day one."
  icon        = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>'

